<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felipe Figueira</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      max-width: 700px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      margin: 0 auto 32px;
      letter-spacing: 2px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 48px;
      letter-spacing: 1px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      margin: 0 auto 48px;
      border-radius: 2px;
    }

    .about {
      font-size: 1rem;
      line-height: 1.8;
      color: #aaa;
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.85;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      color: #fff;
    }

    .btn-outline {
      border: 2px solid #6c63ff;
      color: #6c63ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">FF</div>
    <h1>Felipe Figueira</h1>
    <p class="tagline">Desenvolvedor &amp; Criador</p>
    <div class="divider"></div>
    <p class="about">
      Olá! Sou Felipe Figueira. Bem-vindo ao meu espaço na web.<br>
      Apaixonado por tecnologia, código e soluções criativas.
    </p>
    <div class="links">
      <a href="mailto:contato@exemplo.com" class="btn btn-primary">Entrar em contato</a>
      <a href="#" class="btn btn-outline">Ver projetos</a>
    </div>
  </div>
</body>
</html>
